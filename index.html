<body>
    <canvas id="canvas" aria-label="Fractal animation"></canvas>

    <a id="portal" href="topdown/" target="_blank" rel="noopener" aria-label="Open Topdown">

    <script id="fractal-shader" type="x-shader/x-fragment">
        precision highp float;

        uniform vec2  u_resolution;
        uniform float iTime;
        uniform vec2  u_mouse;
        uniform float u_timeAnimationSpeed;
        uniform float u_patternFrequency;
        uniform float u_detailTimeFactor;
        uniform float u_paletteTimeFactor;
        uniform float u_holeRadius;

        vec3 palette(float t) {
            vec3 a = vec3(0.5);
            vec3 b = vec3(0.5);
            vec3 c = vec3(1.0);
            vec3 d = vec3(0.263, 0.416, 0.557);
            return a + b * cos(6.28318 * (c * t + d));
        }

        float ringField(float rd, float freq) {
            float tanArg = rd * freq;
            float d;
            if (tanArg < 0.0001) {
                d = 1e5;
            } else if (abs(cos(tanArg)) < 0.0001) {
                d = 1e-5; // near a tan() pole
            } else {
                d = iTime * u_detailTimeFactor / tan(tanArg);
            }
            return d * sin(d * iTime);
        }

        void main() {
            // Normalised screen coordinates: origin at centre, y up.
            vec2 uv = (gl_FragCoord.xy * 2.0 - u_resolution) / u_resolution.y;
            vec2 mouse = (u_mouse * 2.0 - u_resolution) / u_resolution.y;
            float screenDist = length(uv);

            // Zoom in as the pointer approaches the centre — the "focus" effect.
            float zoom = 1.0 - smoothstep(0.005, 0.5, length(mouse));
            uv *= 0.5 - 0.49 * zoom;
            uv /= iTime * u_timeAnimationSpeed;

            float rd = length(uv);

            // Two ring systems at golden-ratio frequencies stand in for the
            // additive instances the old design layered — their beats make the moiré.
            float phase = sin(iTime * u_paletteTimeFactor) * 0.4;
            vec3 col = palette(phase + screenDist * 0.5)
                     * ringField(rd, u_patternFrequency) * 3.0;
            col += palette(phase * 1.3 + 0.33 - screenDist * 0.3)
                     * ringField(rd, u_patternFrequency * 1.618) * 2.2;
            col = clamp(col, 0.0, 1.0);

            // Black hole at the centre — the portal into Topdown sits inside it.
            col *= smoothstep(u_holeRadius * 0.9, u_holeRadius * 1.3, screenDist);

            // Slight dither to hide banding.
            float n = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233))) * 43758.5453);
            col += (n - 0.5) * (1.5 / 255.0);

            gl_FragColor = vec4(col, 1.0);
        }
    </script>

    <script>
    // --- Fractal background: one fullscreen shader pass in raw WebGL ---
    (function () {
        'use strict';

        const canvas = document.getElementById('canvas');
        const gl = canvas.getContext('webgl');
        if (!gl) return;

        // The shader divides by iTime, so start well past t=0 for a fully developed pattern.
        const START_TIME = 1017.5877;

        function compile(type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            return shader;
        }

        const program = gl.createProgram();
        gl.attachShader(program, compile(gl.VERTEX_SHADER,
            'attribute vec2 aPos; void main() { gl_Position = vec4(aPos, 0.0, 1.0); }'));
        gl.attachShader(program, compile(gl.FRAGMENT_SHADER,
            document.getElementById('fractal-shader').textContent));
        gl.linkProgram(program);
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error(gl.getProgramInfoLog(program));
            return;
        }
        gl.useProgram(program);

        // One triangle that covers the whole screen.
        gl.bindBuffer(gl.ARRAY_BUFFER, gl.createBuffer());
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
        const aPos = gl.getAttribLocation(program, 'aPos');
        gl.enableVertexAttribArray(aPos);
        gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

        const uniform = name => gl.getUniformLocation(program, name);
        const uResolution = uniform('u_resolution');
        const uTime = uniform('iTime');
        const uMouse = uniform('u_mouse');
        const uHoleRadius = uniform('u_holeRadius');

        gl.uniform1f(uniform('u_timeAnimationSpeed'), 0.0015);
        gl.uniform1f(uniform('u_patternFrequency'), 0.10);
        gl.uniform1f(uniform('u_detailTimeFactor'), 0.000003);
        gl.uniform1f(uniform('u_paletteTimeFactor'), 1.0);

        let W, H;
        let mouseX = -1000, mouseY = -1000; // offscreen until first pointer event

        function resize() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;
            gl.viewport(0, 0, W, H);
            gl.uniform2f(uResolution, W, H);
            // World-space radius matching the portal's CSS size: min(46vmin, 480px) diameter.
            gl.uniform1f(uHoleRadius, Math.min(0.46 * Math.min(W, H), 480) / H);
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Portal: reveal the Topdown build as the pointer nears the centre ---

        const portal = document.getElementById('portal');
        const portalFrame = document.getElementById('portal-frame');
        let focus = 0;

        // Start the flyover early: its opening seconds are nearly black space,
        // so by the time the pointer approaches there is terrain to see.
        window.addEventListener('load', () => {
            setTimeout(() => { portalFrame.src = 'topdown/'; }, 1500);
        });

        const smoothstep = (a, b, x) => {
            const t = Math.min(1, Math.max(0, (x - a) / (b - a)));
            return t * t * (3 - 2 * t);
        };

        function updateMouse(event) {
            mouseX = event.clientX;
            mouseY = H - event.clientY; // shader uses y-up
        }
        window.addEventListener('pointermove', updateMouse);
        window.addEventListener('pointerdown', updateMouse);

        function updatePortal(dt) {
            const wx = (mouseX / W - 0.5) * 2 * (W / H);
            const wy = (mouseY / H - 0.5) * 2;
            const target = 1 - smoothstep(0.15, 0.55, Math.hypot(wx, wy));
            focus += (target - focus) * Math.min(1, dt * 6);

            portal.style.opacity = Math.pow(focus, 1.5).toFixed(3);
            portal.style.transform = `translate(-50%, -50%) scale(${(0.72 + 0.28 * focus).toFixed(3)})`;
            portal.style.pointerEvents = focus > 0.6 ? 'auto' : 'none';
        }

        // --- Render loop ---

        const t0 = performance.now();
        let lastFrame = t0;

        function render(now) {
            requestAnimationFrame(render);
            const dt = Math.min((now - lastFrame) / 1000, 0.05);
            lastFrame = now;

            updatePortal(dt);

            gl.uniform1f(uTime, START_TIME + (now - t0) / 1000);
            gl.uniform2f(uMouse, mouseX, mouseY);
            gl.drawArrays(gl.TRIANGLES, 0, 3);
        }
        requestAnimationFrame(render);
    })();

    // --- Emblem: a miniature three-body orbit with trails, set inside an ouroboros ---
    (function () {
        'use strict';

        const bg = document.getElementById('emblem-bg');
        const fg = document.getElementById('emblem-fg');
        const bctx = bg.getContext('2d');
        const ctx = fg.getContext('2d');
        if (!bctx || !ctx) return;

        const TAU = Math.PI * 2;
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const SIZE = 60;
        const S = SIZE * dpr;
        bg.width = fg.width = S;
        bg.height = fg.height = S;
        const C = S / 2;

        // --- Ouroboros background: opaque disc with a serpent ring, drawn once.
        // The disc keeps the fractal from showing through the emblem.
        bctx.fillStyle = '#000';
        bctx.beginPath();
        bctx.arc(C, C, C, 0, TAU);
        bctx.fill();

        // Serpent ring: pre-rendered image with a transparent background,
        // drawn over the disc once loaded.
        const serpent = new Image();
        serpent.onload = () => bctx.drawImage(serpent, 0, 0, S, S);
        serpent.src = 'snake.png';

        // --- Three-body simulation, drawn on the transparent foreground layer.

        const H = 0.002; // leapfrog step
        // Known stable three-body orbits: initial positions/velocities per body,
        // plus a display scale/shift that keeps the path inside the canvas.
        const ORBITS = [
            { // Figure-8
                p: [[-1, 0], [1, 0], [0, 0]],
                v: [[0.347111, 0.532728], [0.347111, 0.532728], [-0.694222, -1.065456]],
                scale: 0.3, shift: [0, 0]
            },
            {
                p: [[0.284319, 0], [0.873609, 0], [-1.157929, 0]],
                v: [[0, 1.377417], [0, -0.488422], [0, -0.888995]],
                scale: 0.3, shift: [0, 0]
            },
            {
                p: [[0.013260, 0], [1.415728, 0], [-1.428989, 0]],
                v: [[0, 1.054151], [0, -0.210146], [0, -0.844005]],
                scale: 0.3, shift: [0, 0]
            },
            {
                p: [[0.873304, 0], [-0.625403, 0], [-0.247901, 0]],
                v: [[0, 1.010776], [0, -1.683353], [0, 0.672576]],
                scale: 0.3, shift: [0, 0]
            },
            { // Butterfly I
                p: [[0.666163, -0.081921], [-0.025192, 0.454448], [-0.103013, -0.765806]],
                v: [[0.841202, 0.029746], [0.142642, -0.492315], [-0.983845, 0.462569]],
                scale: 0.3, shift: [-0.15, 0.1]
            },
            { // Butterfly II
                p: [[0.486657, 0.755041], [-0.681737, 0.293660], [-0.022596, -0.612645]],
                v: [[-0.182709, 0.363013], [-0.579074, -0.748157], [0.761784, 0.385144]],
                scale: 0.3, shift: [0.1, -0.1]
            }
        ];

        const orbit = ORBITS[Math.floor(Math.random() * ORBITS.length)];
        const p = orbit.p.map(a => ({ x: a[0], y: a[1] }));
        const v = orbit.v.map(a => ({ x: a[0], y: a[1] }));

        // Display coords (pos * scale + shift) stay within about ±0.55.
        const DISPLAY_HALF = 0.55;
        const toX = b => C + (b.x * orbit.scale + orbit.shift[0]) * C / DISPLAY_HALF;
        const toY = b => C - (b.y * orbit.scale + orbit.shift[1]) * C / DISPLAY_HALF;

        function accelerations() {
            const a = [{ x: 0, y: 0 }, { x: 0, y: 0 }, { x: 0, y: 0 }];
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    if (i === j) continue;
                    const dx = p[j].x - p[i].x;
                    const dy = p[j].y - p[i].y;
                    const r2 = dx * dx + dy * dy + 1e-6;
                    const inv = 1 / (r2 * Math.sqrt(r2));
                    a[i].x += dx * inv;
                    a[i].y += dy * inv;
                }
            }
            return a;
        }

        function step() { // leapfrog (kick-drift-kick)
            let a = accelerations();
            for (let i = 0; i < 3; i++) {
                v[i].x += a[i].x * H / 2;
                v[i].y += a[i].y * H / 2;
                p[i].x += v[i].x * H;
                p[i].y += v[i].y * H;
            }
            a = accelerations();
            for (let i = 0; i < 3; i++) {
                v[i].x += a[i].x * H / 2;
                v[i].y += a[i].y * H / 2;
            }
        }

        let last = performance.now();
        let accumulator = 0;

        function frame(now) {
            requestAnimationFrame(frame);
            accumulator += Math.min((now - last) / 1000, 0.05);
            last = now;
            while (accumulator >= H) {
                step();
                accumulator -= H;
            }

            // Fade previous frame's alpha — leaves the trails, keeps this layer
            // transparent so the ouroboros beneath stays crisp.
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, S, S);
            ctx.globalCompositeOperation = 'source-over';

            ctx.fillStyle = '#fff';
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.arc(toX(p[i]), toY(p[i]), 1.3 * dpr, 0, TAU);
                ctx.fill();
            }
        }
        requestAnimationFrame(frame);
    })();
    </script>
