<!doctypehtml><html lang=en><head><meta charset=utf-8><meta content="width=device-width,initial-scale=1"name=viewport><title>Topdown</title><style>body,html{margin:0;height:100%;overflow:hidden;background:#05060f}body{display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}canvas{display:block;width:min(100vw,150vh);height:min(100vh,66.667vw)}#controls{position:fixed;left:12px;bottom:12px;z-index:10;padding:8px 12px;border-radius:8px;background:rgba(5,6,15,.55);border:1px solid rgba(255,255,255,.12);color:#cdd3e0;font-size:12px;line-height:1.7;backdrop-filter:blur(4px);pointer-events:none;user-select:none}#controls.hidden{display:none}#controls b{color:#fff;letter-spacing:.04em}#controls .row{white-space:nowrap}#controls .hint{margin-top:4px;color:#8b93a7;font-size:11px}#controls kbd{display:inline-block;min-width:1em;text-align:center;padding:1px 5px;margin:0 1px;border-radius:4px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);font-family:ui-monospace,monospace;font-size:11px;color:#fff}</style></head><body><canvas id=canvas oncontextmenu=event.preventDefault() tabindex=-1></canvas><div id=controls><b>CONTROLS</b><div class=row><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> pan   <kbd>Q</kbd><kbd>E</kbd> rotate</div><div class=row><kbd>I</kbd> iso / flat view   <kbd>O</kbd><kbd>P</kbd> pour water</div><div class="row hint">touch: drag to rotate · tap to switch view</div><div class="row hint">press <kbd>Space</kbd> to hide</div></div><script>window.self!==window.top&&document.getElementById("controls").classList.add("hidden"),window.addEventListener("keydown",(function(e){"Space"!==e.code&&" "!==e.key||(document.getElementById("controls").classList.toggle("hidden"),e.preventDefault(),e.stopPropagation())}),!0)</script><script>var Module={canvas:document.getElementById("canvas")}</script><script async src=topdown-standalone.js></script></body></html>
